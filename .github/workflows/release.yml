name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build universal binary
        run: ./scripts/build.sh

      - name: Generate checksum
        run: shasum -a 256 wechattweak > wechattweak.sha256

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            wechattweak
            wechattweak.sha256
          generate_release_notes: true
